name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
      - run: go vet ./...
      - run: go test -race ./...

  test-freebsd:
    name: test (freebsd)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Test on FreeBSD
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636 # v1.4.8
        with:
          usesh: true
          prepare: |
            pkg install -y go
          run: |
            go vet ./...
            go test -race ./...

  test-openbsd:
    name: test (openbsd)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Test on OpenBSD
        uses: vmactions/openbsd-vm@fcf799d7ce9c305ad89eabef1fb2fa5c1c42d0ee # v1.4.3
        with:
          usesh: true
          prepare: |
            pkg_add go
            go version
          run: |
            go vet ./...
            go test ./... # -race is not supported on openbsd/amd64

  test-netbsd:
    name: test (netbsd)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: vmactions/netbsd-vm@99816dccf75edf233ed6cd00a159e3a5b85ea373 # v1.4.0
        with:
          usesh: true
          prepare: |
            # pkgsrc has no stable plain "go" package on this image, so fetch
            # the official toolchain for netbsd/amd64 instead.
            ver="$(ftp -o - "https://go.dev/VERSION?m=text" | head -n1)"
            ftp -o go.tar.gz "https://go.dev/dl/${ver}.netbsd-amd64.tar.gz"
            mkdir -p /usr/local
            tar -C /usr/local -xzf go.tar.gz
          run: |
            /usr/local/go/bin/go version
            /usr/local/go/bin/go vet ./...
            /usr/local/go/bin/go test -race ./...
